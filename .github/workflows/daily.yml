name: Pulse Daily Summary Bot
on:
schedule:
# Scheduled run: 2:30 AM UTC = 8:00 AM IST
- cron: '30 2 * * *'

workflow_dispatch:
jobs:
run-pulse:
runs-on: ubuntu-latest
steps:

# job name (your choice)

# use GitHub's free Ubuntu server

# Step 1: Get your code onto the server

- name: Checkout code
  uses: actions/checkout@v4

# Step 2: Install Python 3.11
- name: Set up Python
  uses: actions/setup-python@v5
  with: 
    python-version: '3.11'
    
- name: Install dependencies
  run: pip install -r requirements.txt
  
- name: Run Pulse bot
  run: python bot.py
- name: Upload summary as artifact
  uses: actions/upload-artifact@v4
  with:
    name: daily-summary 
    path: daily_summary.txt
